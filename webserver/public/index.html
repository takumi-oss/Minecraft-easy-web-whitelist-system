<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whitelist Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d0f12; --surface: #131720; --border: #1e2535; --border-hi: #2e3d5a;
      --green: #39ff8f; --green-dim: #1a7a46; --red: #ff4d6d; --yellow: #ffd700;
      --text: #c8d8e8; --text-dim: #5a7080;
      --mono: 'Space Mono', monospace; --display: 'Syne', sans-serif;
    }
    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 14px; }
    body {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; padding: 24px;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(57,255,143,0.07) 0%, transparent 60%),
        repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(255,255,255,0.015) 40px);
    }
    header { width: 100%; max-width: 520px; margin-bottom: 32px; text-align: center; }
    .badge {
      display: inline-block; font-size: 10px; letter-spacing: 0.2em; color: var(--green);
      border: 1px solid var(--green-dim); padding: 3px 10px; border-radius: 2px;
      margin-bottom: 14px; text-transform: uppercase;
    }
    h1 { font-family: var(--display); font-size: clamp(22px,5vw,32px); font-weight: 800; color: #fff; }
    h1 span { color: var(--green); }
    .subtitle { margin-top: 8px; font-size: 12px; color: var(--text-dim); letter-spacing: 0.04em; }
    .card { width: 100%; max-width: 520px; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; overflow: hidden; }
    .card-header { display: flex; align-items: center; gap: 8px; padding: 12px 18px; border-bottom: 1px solid var(--border); font-size: 11px; color: var(--text-dim); letter-spacing: 0.06em; }
    .dot { width: 8px; height: 8px; border-radius: 50%; }
    .dot-green { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .dot-yellow { background: var(--yellow); }
    .dot-red { background: var(--red); }
    .card-body { padding: 24px; }
    label { display: block; font-size: 11px; letter-spacing: 0.12em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
    .input-row { display: flex; gap: 8px; }
    input[type="text"] {
      flex: 1; background: var(--bg); border: 1px solid var(--border-hi); color: var(--text);
      font-family: var(--mono); font-size: 15px; padding: 12px 14px; border-radius: 4px;
      outline: none; transition: border-color 0.2s, box-shadow 0.2s; caret-color: var(--green);
    }
    input[type="text"]::placeholder { color: var(--text-dim); }
    input[type="text"]:focus { border-color: var(--green); box-shadow: 0 0 0 3px rgba(57,255,143,0.1); }
    button {
      background: var(--green); color: #0a0c0f; border: none; font-family: var(--mono);
      font-weight: 700; font-size: 13px; padding: 12px 20px; border-radius: 4px;
      cursor: pointer; letter-spacing: 0.04em; transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    button:hover { background: #5fffaa; box-shadow: 0 0 20px rgba(57,255,143,0.4); }
    button:active { transform: scale(0.97); }
    button:disabled { background: var(--green-dim); cursor: not-allowed; box-shadow: none; }
    .status { margin-top: 16px; padding: 12px 14px; border-radius: 4px; font-size: 12px; line-height: 1.6; display: none; animation: fadeIn 0.2s ease; }
    .status.success { display: block; background: rgba(57,255,143,0.08); border: 1px solid var(--green-dim); color: var(--green); }
    .status.error   { display: block; background: rgba(255,77,109,0.08);  border: 1px solid rgba(255,77,109,0.3); color: var(--red); }
    .status-prefix { font-weight: 700; margin-right: 6px; }
    .divider { margin: 20px 0; border: none; border-top: 1px solid var(--border); }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .info-item { background: var(--bg); border: 1px solid var(--border); border-radius: 4px; padding: 10px 12px; }
    .info-label { font-size: 10px; letter-spacing: 0.1em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 4px; }
    .info-value { font-size: 13px; color: var(--text); }
    .info-value.live { color: var(--green); }
    .queue-section { margin-top: 12px; }
    .queue-title { font-size: 11px; letter-spacing: 0.1em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; }
    .queue-list { list-style: none; max-height: 120px; overflow-y: auto; }
    .queue-list li { display: flex; align-items: center; gap: 8px; padding: 6px 10px; border-radius: 3px; font-size: 12px; border: 1px solid var(--border); margin-bottom: 4px; background: var(--bg); }
    .q-name { flex: 1; } .q-time { color: var(--text-dim); font-size: 10px; }
    footer { margin-top: 20px; font-size: 11px; color: var(--text-dim); letter-spacing: 0.05em; }
    @keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 2px; }
  </style>
</head>
<body>
  <header>
    <div class="badge">▶ BDS Whitelist Manager</div>
    <h1>Player <span>Whitelist</span></h1>
    <p class="subtitle" id="subtitle">Minecraft Bedrock サーバー ホワイトリスト管理</p>
  </header>

  <div class="card">
    <div class="card-header">
      <span class="dot dot-green"></span>
      <span class="dot dot-yellow"></span>
      <span class="dot dot-red"></span>
      <span style="margin-left:8px;" id="server-label">SERVER ONLINE</span>
    </div>
    <div class="card-body">
      <label for="playerName">プレイヤー名 (Gamertag)</label>
      <div class="input-row">
        <input type="text" id="playerName" placeholder="Steve" maxlength="16" autocomplete="off" spellcheck="false" />
        <button id="submitBtn" onclick="submitWhitelist()">追加</button>
      </div>
      <div class="status" id="status">
        <span class="status-prefix" id="status-prefix"></span>
        <span id="status-msg"></span>
      </div>
      <hr class="divider" />
      <div class="info-grid">
        <div class="info-item">
          <div class="info-label">Status</div>
          <div class="info-value live" id="info-status">● ONLINE</div>
        </div>
        <div class="info-item">
          <div class="info-label">Queue</div>
          <div class="info-value" id="info-queue">0 件待機中</div>
        </div>
      </div>
      <div class="queue-section">
        <div class="queue-title">処理待ちキュー</div>
        <ul class="queue-list" id="queue-list"></ul>
      </div>
    </div>
  </div>

  <footer>© Minecraft Whitelist Manager</footer>

  <script>
    async function loadUiConfig() {
      try {
        const r = await fetch('/api/ui-config');
        const c = await r.json();
        document.title = c.title;
        document.getElementById('subtitle').textContent = c.server_name + ' へのホワイトリスト管理';
        document.getElementById('server-label').textContent = c.server_name.toUpperCase();
      } catch (_) {}
    }

    async function submitWhitelist() {
      const input = document.getElementById('playerName');
      const btn   = document.getElementById('submitBtn');
      const name  = input.value.trim();
      if (!name) { showStatus(false, 'プレイヤー名を入力してください。'); return; }
      btn.disabled = true; btn.textContent = '送信中...';
      try {
        const res  = await fetch('/api/whitelist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: `playerName=${encodeURIComponent(name)}`,
        });
        const data = await res.json();
        if (data.success) { showStatus(true, data.message); input.value = ''; refreshQueue(); }
        else               { showStatus(false, data.error || 'エラーが発生しました。'); }
      } catch (e) {
        showStatus(false, 'サーバーとの通信に失敗しました: ' + e.message);
      } finally {
        btn.disabled = false; btn.textContent = '追加';
      }
    }

    function showStatus(ok, msg) {
      const el = document.getElementById('status');
      el.className = 'status ' + (ok ? 'success' : 'error');
      document.getElementById('status-prefix').textContent = ok ? '[OK]' : '[ERR]';
      document.getElementById('status-msg').textContent = msg;
      clearTimeout(el._timer);
      el._timer = setTimeout(() => { el.style.display = 'none'; }, 6000);
    }

    async function refreshQueue() {
      try {
        const r    = await fetch('/api/pending');
        const data = await r.json();
        const list = data.players || [];
        document.getElementById('info-queue').textContent = `${list.length} 件待機中`;
        const ul = document.getElementById('queue-list');
        ul.innerHTML = '';
        if (list.length === 0) {
          ul.innerHTML = '<li style="border:none;background:none;justify-content:center;color:var(--text-dim);font-size:12px;">キューは空です</li>';
        } else {
          list.forEach(p => {
            const li = document.createElement('li');
            const elapsed = Math.floor((Date.now() - p.timestamp) / 1000);
            li.innerHTML = `<span style="color:var(--yellow)">⏳</span><span class="q-name">${p.name.replace(/[<>]/g,'')}</span><span class="q-time">${elapsed}秒前</span>`;
            ul.appendChild(li);
          });
        }
      } catch (_) {
        document.getElementById('info-status').textContent = '● OFFLINE';
        document.getElementById('info-status').style.color = 'var(--red)';
      }
    }

    document.getElementById('playerName').addEventListener('keydown', e => { if (e.key === 'Enter') submitWhitelist(); });
    loadUiConfig(); refreshQueue(); setInterval(refreshQueue, 5000);
  </script>
</body>
</html>
